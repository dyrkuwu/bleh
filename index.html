<!DOCTYPE html>
<html lang="en">
<head>
    <title>loading</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            margin-bottom: 10vh;
        }

        .container img {
            max-width: 100%;
            height: auto;
        }

        .container p {
            color: white;
            font-size: 18px;
            font-family: 'Anonymous Pro', monospace;
        }

        .dots {
            display: inline-block;
            min-width: 1.2em;
            text-align: left;
        }

        .star-progress {
            position: relative;
            display: inline-block;
            font-size: 256px;
            font-weight: bold;
            margin-bottom: 0.2em;
            line-height: 1;
        }

        .star-bg {
            color: #333;
        }

        .star-fill {
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            white-space: nowrap;
            width: 0%;
            transition: width 0.1s linear;
            color: #f5c518;
        }

        .file-log {
            margin-top: 0.6em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            pointer-events: none;
        }

        .file-log-entry {
            font-family: 'Anonymous Pro', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 600px;
            transition: opacity 0.3s, font-size 0.3s, color 0.3s;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="star-progress">
        <span class="star-bg">&#9733;</span>
        <span class="star-fill" id="star-fill">&#9733;</span>
    </div>
    <p style="margin-top: 0.2em;"><span id="status-label">loading</span><span class="dots" id="dots">.</span></p>
    <div class="file-log" id="file-log"></div>
<script>
        var fill = document.getElementById('star-fill');

        function LoadingProgress(progress) {
            fill.style.width = progress + '%';
        }

        function SetStatusLabel(status) {
            document.getElementById('status-label').textContent = status;
        }

        var fileLog = [];
        var fileLogEl = document.getElementById('file-log');

        function DownloadingFile(fileName) {
            fileLog.unshift(fileName);
            if (fileLog.length > 10) fileLog.pop();

            fileLogEl.innerHTML = '';
            for (var i = 0; i < fileLog.length; i++) {
                var t = i / (Math.max(fileLog.length, 1) - 1 || 1);
                var entry = document.createElement('div');
                entry.className = 'file-log-entry';
                entry.textContent = fileLog[i];
                var size = 14 - i * 0.8;
                var opacity = 1 - (i / 10) * 0.85;
                var lightness = Math.round(100 - i * 7);
                entry.style.fontSize = size + 'px';
                entry.style.opacity = opacity;
                entry.style.color = 'hsl(0,0%,' + lightness + '%)';
                entry.style.marginBottom = '1px';
                fileLogEl.appendChild(entry);
            }
        }

        (function () {
            var el = document.getElementById('dots');
            var n = 0;
            setInterval(function () {
                n = (n % 3) + 1;
                el.textContent = Array(n + 1).join('.');
            }, 400);
        })();
    </script>
</div>
</body>
</html>
